<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Live Comment Overlay</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/assets/app.css">
    <script src="/assets/control.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>YouTube Live Comment Overlay</h1>
          <p class="muted">Local control for Chrome, YouTube popout chat, and OBS.</p>
        </div>
        <div class="connection" id="connection-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="connection-label">Connecting</span>
        </div>
      </header>

      <section class="workspace" aria-label="Overlay controls">
        <form class="panel chat-panel" id="chat-form">
          <div class="field">
            <label for="chat-input">YouTube video ID or popout chat URL</label>
            <div class="input-row">
              <input id="chat-input" name="chat-input" autocomplete="off" spellcheck="false" placeholder="FkGmLABFJeU">
              <button class="primary-button" type="submit">Open Chat</button>
            </div>
          </div>
          <p class="status-line" id="chat-status" role="status"></p>
        </form>

        <section class="panel obs-panel" aria-label="OBS overlay source">
          <div class="field">
            <label for="overlay-url">OBS Browser Source URL</label>
            <div class="input-row">
              <input id="overlay-url" readonly>
              <button type="button" id="copy-overlay">Copy</button>
              <button type="button" id="open-overlay">Open</button>
            </div>
          </div>
          <div class="button-row">
            <button type="button" id="clear-overlay">Clear Overlay</button>
            <a class="secondary-link" href="/fixture" target="_blank" rel="noreferrer">Open Fixture</a>
          </div>
        </section>

        <section class="panel preview-panel" aria-label="Current overlay comment">
          <h2>Current Comment</h2>
          <div class="preview-card is-empty" id="preview-card" dir="auto">
            <div class="preview-avatar" id="preview-avatar" aria-hidden="true"></div>
            <div class="preview-copy">
              <div class="preview-author" id="preview-author" dir="auto">No comment selected</div>
              <div class="preview-message" id="preview-message" dir="auto"></div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
